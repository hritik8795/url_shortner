services:
  - type: web
    name: url-shortener-api
    runtime: python

    buildCommand: "pip install -r requirements.txt"

    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString

databases:
  - name: url-shortener-db